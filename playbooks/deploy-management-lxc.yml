---
- name: Provision Management LXC on Proxmox
  hosts: proxmox
  gather_facts: no
  vars:
    lxc_vmid: 101
    lxc_hostname: mgmt
    lxc_memory: 4096
    lxc_cores: 2
    lxc_disk_size: 20G
    lxc_type: core
  roles:
    - role: lxc-ubuntu

- name: Configure Management LXC
  hosts: management
  remote_user: root
  become: yes
  pre_tasks:
    - name: Wait for connection
      wait_for_connection:
        timeout: 60
  roles:
    - role: common
    - role: docker
      vars:
        docker_user: "{{ primary_user }}"
    - role: ai-tools

  tasks:
    - name: Install python3-venv and python3-pip
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
        state: present
        update_cache: yes

    - name: Ensure primary user's home directory exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/ansible"
        state: directory
        owner: "{{ primary_user }}"
        group: "{{ primary_user }}"
        mode: '0755'

    - name: Create Python virtual environment for Ansible
      ansible.builtin.command:
        cmd: "python3 -m venv /home/{{ primary_user }}/ansible/venv"
        creates: "/home/{{ primary_user }}/ansible/venv"
      become_user: "{{ primary_user }}"

    - name: Install Ansible in virtual environment
      ansible.builtin.pip:
        name: 
          - ansible
          - ansible-core
        virtualenv: "/home/{{ primary_user }}/ansible/venv"
      become_user: "{{ primary_user }}"

    - name: Add alias for ansible in .zshrc
      ansible.builtin.lineinfile:
        path: "/home/{{ primary_user }}/.zshrc"
        line: "alias ans='/home/{{ primary_user }}/ansible/venv/bin/ansible-playbook'"
        create: yes
        owner: "{{ primary_user }}"
        group: "{{ primary_user }}"
        mode: '0644'
