---
# playbooks/backup-pihole.yml
- name: Backup Pi-hole v6 and /etc/hosts
  hosts: pihole_hosts
  become: true
  gather_facts: true

  tasks:
    - name: Set backup timestamp
      ansible.builtin.set_fact:
        backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"

    - name: Create temporary directory for backup
      ansible.builtin.tempfile:
        state: directory
        suffix: pihole_backup
      register: temp_backup_dir

    - name: Run Pi-hole Teleporter backup
      ansible.builtin.command:
        cmd: pihole-FTL --teleporter
        chdir: "{{ temp_backup_dir.path }}"
      register: teleporter_output
      changed_when: true

    - name: Find the generated backup file
      ansible.builtin.find:
        paths: "{{ temp_backup_dir.path }}"
        patterns: "*.zip"
      register: backup_file

    - name: Fail if backup file was not found
      ansible.builtin.fail:
        msg: "Pi-hole teleporter backup file not found in {{ temp_backup_dir.path }}"
      when: backup_file.matched == 0

    - name: Fetch Pi-hole teleporter archive to local backups folder
      ansible.builtin.fetch:
        src: "{{ backup_file.files[0].path }}"
        dest: "{{ playbook_dir }}/../backups/pihole/{{ inventory_hostname }}/{{ backup_timestamp }}/"
        flat: true

    - name: Fetch /etc/hosts to local backups folder
      ansible.builtin.fetch:
        src: /etc/hosts
        dest: "{{ playbook_dir }}/../backups/pihole/{{ inventory_hostname }}/{{ backup_timestamp }}/hosts"
        flat: true

    - name: Remove remote temporary backup directory
      ansible.builtin.file:
        path: "{{ temp_backup_dir.path }}"
        state: absent
      when: temp_backup_dir.path is defined
