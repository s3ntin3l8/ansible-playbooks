---
- name: Deploy Management Applications
  hosts: docker_hosts
  become: true

  roles:
    - docker
    - ai-tools

  tasks:
    - name: Create base directory for Docker apps
      ansible.builtin.file:
        path: "{{ docker_apps_path }}"
        state: directory
        mode: '0755'

    - name: Deploy Uptime Kuma
      block:
        - name: Create Uptime Kuma data directory
          ansible.builtin.file:
            path: "{{ docker_apps_path }}/uptime-kuma"
            state: directory
            mode: '0755'

        - name: Run Uptime Kuma container
          community.docker.docker_container:
            name: uptime-kuma
            image: louislam/uptime-kuma:1
            state: started
            restart_policy: always
            published_ports:
              - "{{ uptime_kuma_port }}:3001"
            volumes:
              - "{{ docker_apps_path }}/uptime-kuma:/app/data"
            labels:
              traefik.enable: "true"
              traefik.http.routers.uptime.rule: "Host(`uptime.{{ traefik_domain }}`)"
              traefik.http.routers.uptime.entrypoints: "web"
              traefik.http.services.uptime.loadbalancer.server.port: "3001"

    - name: Deploy NetBox
      block:
        - name: Create NetBox directory
          ansible.builtin.file:
            path: "{{ docker_apps_path }}/netbox"
            state: directory
            mode: '0755'

        - name: Clone NetBox Docker repository
          ansible.builtin.git:
            repo: https://github.com/netbox-community/netbox-docker.git
            dest: "{{ docker_apps_path }}/netbox"
            version: release
            force: true

        - name: Create docker-compose.override.yml for NetBox
          ansible.builtin.copy:
            dest: "{{ docker_apps_path }}/netbox/docker-compose.override.yml"
            content: |
              services:
                netbox:
                  ports:
                    - "8000:8080"
            mode: '0644'

        - name: Pull NetBox images
          ansible.builtin.command:
            cmd: docker compose pull
            chdir: "{{ docker_apps_path }}/netbox"
          changed_when: false

        - name: Start NetBox via Docker Compose
          ansible.builtin.command:
            cmd: docker compose up -d
            chdir: "{{ docker_apps_path }}/netbox"
          changed_when: false
