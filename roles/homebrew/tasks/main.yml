---
# roles/homebrew/tasks/main.yml

- name: Install Homebrew dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Check if Homebrew is already installed
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: brew_bin

- name: Create Homebrew directory with correct permissions
  ansible.builtin.file:
    path: /home/linuxbrew
    state: directory
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_user }}"
    mode: '0755'
  become: yes
  when: not brew_bin.stat.exists

- name: Install Homebrew for {{ homebrew_user }}
  ansible.builtin.shell:
    cmd: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  become: yes
  become_user: "{{ homebrew_user }}"
  environment:
    NONINTERACTIVE: "1"
  when: not brew_bin.stat.exists

- name: Configure Homebrew shell environment in .bashrc
  ansible.builtin.blockinfile:
    path: "{{ homebrew_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Homebrew config"
    block: |
      # Homebrew configuration
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
    create: true
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_user }}"
    mode: '0644'
