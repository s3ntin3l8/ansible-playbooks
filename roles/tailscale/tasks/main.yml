---
- name: OS-specific setup (Debian/Ubuntu)
  block:
    - name: Check if Tailscale is installed (Debian)
      ansible.builtin.command: which tailscale
      register: ts_check_debian
      failed_when: false
      changed_when: false

    - name: Install Tailscale (Debian)
      ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
      when: ts_check_debian.rc != 0
  when: ansible_os_family == "Debian"

- name: OS-specific setup (Alpine)
  block:
    - name: Install Tailscale (Alpine)
      community.general.apk:
        name: [tailscale, curl, iproute2]
        state: present

    - name: Setup Daily Automatic Upgrades (Alpine)
      ansible.builtin.copy:
        dest: /etc/periodic/daily/apk-upgrade
        content: |
          #!/bin/sh
          apk upgrade --available
        mode: '0755'
  when: ansible_os_family == "Alpine"

- name: Enable Tailscale Service
  ansible.builtin.service:
    name: tailscale
    enabled: yes
    state: started

- name: Enable IPv4 and IPv6 forwarding
  ansible.builtin.shell: |
    echo "net.ipv4.ip_forward=1" > /etc/sysctl.d/99-tailscale.conf
    echo "net.ipv6.conf.all.forwarding=1" >> /etc/sysctl.d/99-tailscale.conf
    sysctl -p /etc/sysctl.d/99-tailscale.conf
  changed_when: true

- name: Initialize Tailscale to generate the login URL
  ansible.builtin.shell: "timeout {{ tailscale_auth_timeout }} tailscale up --advertise-routes={{ subnet_routes }} || true"
  register: tailscale_up
  changed_when: false

- name: Display Tailscale Setup Output (Login URL)
  ansible.builtin.debug:
    msg: "{{ tailscale_up.stderr | default(tailscale_up.stdout) }}"

- name: Enable Tailscale auto-update
  ansible.builtin.command: tailscale set --auto-update
  failed_when: false
  changed_when: false

- name: Check Tailscale status
  ansible.builtin.command: tailscale status
  register: ts_status
  changed_when: false
  failed_when: false

- name: Report existing node status
  ansible.builtin.debug:
    msg: "{{ ts_status.stdout }}"
  when: ts_status.rc == 0

- name: Append 'tailscale' tag to Proxmox LXC
  delegate_to: proxmox
  ansible.builtin.shell: |
    EXISTING_TAGS=$(pct config {{ proxmox_vmid }} | grep '^tags:' | awk '{print $2}')
    if [[ "$EXISTING_TAGS" != *"tailscale"* ]]; then
      NEW_TAGS="${EXISTING_TAGS}${EXISTING_TAGS:+;}tailscale"
      pct set {{ proxmox_vmid }} --tags "$NEW_TAGS"
    fi
  when: proxmox_vmid is defined
  changed_when: true
