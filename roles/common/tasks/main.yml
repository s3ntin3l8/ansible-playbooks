---
- name: OS-specific setup (Debian/Ubuntu)
  block:
    - name: Ensure keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download GitHub CLI GPG key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: '0644'

    - name: Add GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli

    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install baseline packages (Debian)
      apt:
        name: "{{ baseline_packages + ['unattended-upgrades', 'dnsutils', 'gh'] }}"
        state: present

    - name: Set sudo group name (Debian)
      set_fact:
        sudo_group: "sudo"
  when: ansible_os_family == "Debian"

- name: OS-specific setup (Alpine)
  block:
    - name: Ensure community repository is enabled
      ansible.builtin.lineinfile:
        path: /etc/apk/repositories
        line: "http://dl-cdn.alpinelinux.org/alpine/latest-stable/community"
        state: present

    - name: Update apk cache and upgrade all packages
      apk:
        update_cache: yes
        upgrade: yes

    - name: Install baseline packages (Alpine)
      apk:
        name: "{{ baseline_packages + ['sudo', 'bind-tools', 'github-cli'] }}"
        state: present

    - name: Set sudo group name (Alpine)
      set_fact:
        sudo_group: "wheel"
  when: ansible_os_family == "Alpine"

- name: Create ansible user
  ansible.builtin.user:
    name: ansible
    uid: "{{ ansible_uid }}"
    groups: "{{ sudo_group }}"
    append: yes
    shell: /bin/bash
    create_home: yes

- name: Allow ansible to have passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/ansible
    state: present
    create: yes
    mode: '0440'
    line: 'ansible ALL=(ALL) NOPASSWD: ALL'
    validate: 'visudo -cf %s'

- name: Install ansible public key
  ansible.builtin.authorized_key:
    user: ansible
    state: present
    key: "{{ ansible_pubkey }}"

- name: Create bjoern user
  ansible.builtin.user:
    name: bjoern
    uid: "{{ bjoern_uid }}"
    groups: "{{ sudo_group }}"
    append: yes
    shell: /bin/bash
    create_home: yes

- name: Allow bjoern to have passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/bjoern
    state: present
    create: yes
    mode: '0440'
    line: 'bjoern ALL=(ALL) NOPASSWD: ALL'
    validate: 'visudo -cf %s'

- name: Fetch bjoern public keys from GitHub
  ansible.builtin.uri:
    url: "https://github.com/{{ github_username }}.keys"
    return_content: yes
  register: bjoern_github_keys

- name: Install bjoern public keys
  ansible.builtin.authorized_key:
    user: bjoern
    state: present
    key: "{{ bjoern_github_keys.content }}"

- name: Ensure SSH password authentication is disabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: Restart SSH

- name: Ensure root login with password is disabled in SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
  notify: Restart SSH
