---
# roles/k3s/tasks/main.yml
- name: Install dependencies
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
    state: present

- name: Create symlink for /dev/kmsg
  ansible.builtin.file:
    src: /dev/console
    dest: /dev/kmsg
    state: link
  ignore_errors: yes  # May fail if already exists or on certain LXC profiles

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s installer
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Install k3s
  ansible.builtin.command:
    cmd: "/tmp/k3s-install.sh {{ k3s_install_flags }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_type }}"
    K3S_URL: "{{ k3s_server_url if k3s_type == 'agent' else omit }}"
    K3S_TOKEN: "{{ k3s_token if k3s_token | length > 0 else omit }}"
    K3S_KUBECONFIG_MODE: "{{ k3s_kubeconfig_mode }}"
    K3S_NODE_NAME: "{{ k3s_node_name }}"
  when: not k3s_binary.stat.exists
  changed_when: true

- name: Ensure k3s service is started and enabled
  ansible.builtin.service:
    name: "{{ 'k3s-agent' if k3s_type == 'agent' else 'k3s' }}"
    state: started
    enabled: true

- name: Wait for k3s to be ready
  ansible.builtin.command:
    cmd: kubectl get nodes
  register: nodes_check
  until: nodes_check.rc == 0
  retries: 20
  delay: 5
  changed_when: false
  when: k3s_type == 'server'
