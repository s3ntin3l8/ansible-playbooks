---
- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - jq
    state: present
    update_cache: true

- name: Install nvm
  ansible.builtin.shell:
    cmd: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ ai_tools_nvm_version }}/install.sh | bash"
    creates: "/home/{{ primary_user }}/.nvm/nvm.sh"
  become: true
  become_user: "{{ primary_user }}"

- name: Install Node.js via nvm
  ansible.builtin.shell:
    cmd: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      nvm install {{ ai_tools_node_version }}
      nvm alias default {{ ai_tools_node_version }}
    executable: /bin/bash
    creates: "/home/{{ primary_user }}/.nvm/alias/default"
  become: true
  become_user: "{{ primary_user }}"

- name: Ensure NVM is sourced in shell profile
  ansible.builtin.lineinfile:
    path: "/home/{{ primary_user }}/.zshrc"
    line: 'export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"'
    create: yes
    owner: "{{ primary_user }}"
    mode: '0644'

- name: Install global AI CLI tools
  ansible.builtin.shell:
    cmd: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      npm install -g {{ item }}
    executable: /bin/bash
  loop: "{{ ai_tools_npm_packages }}"
  become: true
  become_user: "{{ primary_user }}"
  changed_when: false # npm install -g is mostly idempotent but shell always reports change

- name: Append 'ai' tag to Proxmox LXC
  delegate_to: proxmox
  ansible.builtin.shell: |
    EXISTING_TAGS=$(pct config {{ proxmox_vmid }} | grep '^tags:' | awk '{print $2}')
    if [[ "$EXISTING_TAGS" != *"ai"* ]]; then
      NEW_TAGS="${EXISTING_TAGS}${EXISTING_TAGS:+;}ai"
      pct set {{ proxmox_vmid }} --tags "$NEW_TAGS"
    fi
  when: proxmox_vmid is defined
  changed_when: true
