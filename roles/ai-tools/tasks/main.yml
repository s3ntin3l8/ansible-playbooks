---
- name: Install Node.js dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Check if Node.js is installed
  ansible.builtin.command: node -v
  register: node_v_check
  failed_when: false
  changed_when: false

- name: Add NodeSource GPG key and repository
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://deb.nodesource.com/setup_{{ ai_tools_node_version }}.x | bash -
    executable: /bin/bash
  when: node_v_check.rc != 0 or not node_v_check.stdout.startswith('v' ~ ai_tools_node_version | string)

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: latest
    update_cache: true

- name: Install global AI CLI tools
  ansible.builtin.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop: "{{ ai_tools_npm_packages }}"
