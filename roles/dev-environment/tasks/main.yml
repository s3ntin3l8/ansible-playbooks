---
- name: OS-specific setup (Debian/Ubuntu)
  block:
    - name: Ensure keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download GitHub CLI GPG key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: '0644'

    - name: Add GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli

    - name: Install Development Tools
      apt:
        name: "{{ dev_env_packages_debian }}"
        state: present
        update_cache: yes

  when: ansible_os_family == "Debian"

- name: OS-specific setup (Alpine)
  block:
    - name: Install Development Tools
      apk:
        name:
          - zsh
          - build-base
          - python3
          - py3-pip
          - nodejs
          - npm
          - git
          - github-cli
        state: present
        update_cache: yes
  when: ansible_os_family == "Alpine"

- name: Set Zsh as default shell for bjoern
  user:
    name: bjoern
    shell: /usr/bin/zsh
